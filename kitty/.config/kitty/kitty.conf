# use `kitten choose-fonts` to modify this setting
# BEGIN_KITTY_FONTS
font_family      family='Monaspace Neon' style=Light
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# note: font size is overridden in macos-launch-services-cmdline
font_size 11.0

term xterm-256color

scrollback_lines 10000

cursor_blink_interval 0
enable_audio_bell no
shell_integration disabled
url_style none

clear_all_shortcuts yes

map  super+n                  new_os_window
map  super+w                  close_window
map  ctrl+cmd+f               toggle_fullscreen
map  shift+control+c          copy_to_clipboard
map  super+c                  copy_to_clipboard
map  shift+control+v          paste_from_clipboard
map  super+v                  paste_from_clipboard
map  shift+control+equal      change_font_size current +2.0
map  shift+control+minus      change_font_size current -2.0
map  shift+control+backspace  change_font_size current 0

include themes/everforest.conf
